<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAHLIA DROP</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #0a0010, #000000 80%);
  font-family: Arial, sans-serif;
  color: #ff4da6;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* CONTENITORE */
.container {
  text-align: center;
  padding: 50px;
  border-radius: 20px;
  background: rgba(255, 0, 120, 0.05);
  box-shadow: 0 0 60px rgba(255, 0, 120, 0.25);
  backdrop-filter: blur(15px);
}

/* TESTO GLOW */
h1 {
  font-size: 3rem;
  letter-spacing: 4px;
  text-shadow: 
    0 0 10px #ff007f,
    0 0 20px #ff007f,
    0 0 40px #ff007f;
}

.subtitle {
  opacity: 0.8;
  margin-top: 10px;
  text-shadow: 0 0 10px #ff007f;
}

/* TIMER */
#timer {
  font-size: 1.5rem;
  margin: 25px 0;
  text-shadow: 0 0 15px #ff4da6;
}

/* BOTTONE */
button {
  padding: 15px 40px;
  font-size: 1.2rem;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  color: white;
  background: #ff007f;
  box-shadow: 
    0 0 10px #ff007f,
    0 0 30px #ff007f,
    inset 0 0 10px #ff4da6;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 
    0 0 20px #ff007f,
    0 0 60px #ff007f,
    inset 0 0 20px #ff4da6;
}

/* CUORI */
.heart {
  position: absolute;
  width: 12px;
  height: 12px;
  background: #ff4da6;
  transform: rotate(45deg);
  animation: float 8s linear infinite;
  opacity: 0.6;
  filter: blur(1px);
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: #ff4da6;
  border-radius: 50%;
}

.heart::before {
  top: -6px;
}

.heart::after {
  left: -6px;
}

@keyframes float {
  from {
    transform: translateY(100vh) rotate(45deg);
  }
  to {
    transform: translateY(-10vh) rotate(45deg);
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>DAHLIA DROP</h1>
  <div class="subtitle">available for a limited time</div>
  <div id="timer"></div>
  <button id="btn" onclick="download()">DOWNLOAD</button>
</div>

<script>

// 👉 METTI UNA DATA REALE (IMPORTANTISSIMO)
// formato: "YYYY-MM-DDTHH:MM:SS"
const endTime = new Date("2026-05-01T23:59:00").getTime();

const timer = document.getElementById("timer");
const btn = document.getElementById("btn");

function updateTimer() {
  const now = new Date().getTime();
  const diff = endTime - now;

  if (diff <= 0) {
    timer.innerHTML = "DROP TERMINATO";
    btn.style.display = "none";
    return;
  }

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);

  timer.innerHTML = `${h}h ${m}m ${s}s`;
}

setInterval(updateTimer, 1000);
updateTimer();

// DOWNLOAD
function download() {
  window.location.href = "https://www.mediafire.com/file/5bc5qtgq775ob0t/DAHLIAV2.0.apk/file";
}

// CUORI
function spawnHeart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (5 + Math.random()*5) + "s";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 10000);
}

setInterval(spawnHeart, 200);

</script>

</body>
</html>
