<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAHLIA DROP</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #0a0a0a, #1a0010, #0a0a0a, #140014);
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  text-align: center;
  padding: 40px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 0 40px rgba(255,0,120,0.2);
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 2.8rem;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 20px;
}

#timer {
  font-size: 1.4rem;
  margin: 20px 0;
}

button {
  padding: 15px 35px;
  font-size: 1.2rem;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff007f, #ff4da6);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,0,120,0.6);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 35px rgba(255,0,120,1);
}

.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ff4da6;
  transform: rotate(45deg);
  animation: floatUp linear infinite;
  opacity: 0.5;
  filter: blur(0.5px);
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ff4da6;
  border-radius: 50%;
}

.heart::before {
  top: -7px;
}

.heart::after {
  left: -7px;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh) rotate(45deg);
    opacity: 0;
  }
  20% {opacity: 0.6;}
  to {
    transform: translateY(-10vh) rotate(45deg);
    opacity: 0;
  }
}

</style>
</head>

<body>

<div class="container">
  <h1>DAHLIA DROP</h1>
  <div class="subtitle">available for 24 hours</div>
  <div id="timer"></div>
  <button id="btn" onclick="download()">DOWNLOAD</button>
</div>

<script>

// TIMER 24H
const end = new Date().getTime() + 24*60*60*1000;
const timer = document.getElementById("timer");
const btn = document.getElementById("btn");

function update() {
  const now = new Date().getTime();
  const d = end - now;

  if (d <= 0) {
    timer.innerHTML = "DROP TERMINATO";
    btn.style.display = "none";
    return;
  }

  const h = Math.floor((d/(1000*60*60)) % 24);
  const m = Math.floor((d/(1000*60)) % 60);
  const s = Math.floor((d/1000) % 60);

  timer.innerHTML = `${h}h ${m}m ${s}s`;
}

setInterval(update, 1000);

// DOWNLOAD LINK
function download() {
  window.location.href = "https://www.mediafire.com/file/5bc5qtgq775ob0t/DAHLIAV2.0.apk/file";
}

// CUORI DINAMICI
function heart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (6 + Math.random()*6) + "s";

  document.body.appendChild(h);

  setTimeout(() => h.remove(), 12000);
}

setInterval(heart, 250);

</script>

</body>
</html>
